<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    input { width: 94%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 6px; }
    #startBtn { background: #28a745; }
    #stopBtn { background: #dc3545; }
    .status { margin-top: 12px; padding: 10px; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 4px; font-size: 12px; color: #333; }
    .active-status { border-left: 4px solid #28a745; }
    .inactive-status { border-left: 4px solid #dc3545; color: #666; }
  </style>
</head>
<body>

  <h3>AI 필터 제어 센터</h3>
  <input type="text" id="userGoal" placeholder="현재 집중할 목표 입력...">
  
  <button id="startBtn">목표 저장 및 감시 시작</button>
  <button id="stopBtn">감시 중지</button>
  
  <div class="status inactive-status" id="statusMsg">현재 감시 기능이 꺼져 있습니다.</div>

  <script src="popup.js"></script>
</body>
</html>
